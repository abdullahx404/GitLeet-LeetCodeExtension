<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitLeet Settings</title>
  <link rel="stylesheet" href="./settings.css">
</head>
<body>
  <div class="settings-container">
    <h1>LeetCode Sync Settings</h1>
    <div class="subtitle">Configure your GitHub authentication and target synchronization repository.</div>

    <form id="settings-form">
      <div class="form-group">
        <label for="github-token">GitHub Fine-Grained Personal Access Token</label>
        <div class="input-wrapper">
          <input type="password" id="github-token" placeholder="github_pat_XXXXXX" required autocomplete="off">
        </div>
        <div class="helper-text">
          Generate a token with Contents (Read & Write) access in <a href="https://github.com/settings/tokens?type=beta" target="_blank" rel="noopener noreferrer">GitHub Developer Settings</a>.
        </div>
      </div>

      <div class="form-group">
        <label for="repo-owner">Repository Owner (Username or Organization)</label>
        <input type="text" id="repo-owner" placeholder="e.g., abdullahx404" required spellcheck="false">
      </div>

      <div class="form-group">
        <label for="repo-name">Repository Name</label>
        <input type="text" id="repo-name" placeholder="e.g., LeetCode-Solutions" required spellcheck="false">
      </div>

      <div class="form-group">
        <label for="root-folder">Root Folder Name inside Repository</label>
        <input type="text" id="root-folder" value="LeetCode" required spellcheck="false">
      </div>

      <div class="toggle-group">
        <div class="toggle-label">Automatic Sync on Accepted Submission</div>
        <label class="switch">
          <input type="checkbox" id="auto-sync" checked>
          <span class="slider"></span>
        </label>
      </div>

      <div class="actions">
        <button type="button" id="test-btn" class="btn-secondary">Test Connection</button>
        <button type="submit" id="save-btn" class="btn-primary">Save Configuration</button>
      </div>
    </form>

    <div id="status-banner" class="alert"></div>
  </div>

  <script type="module" src="./index.ts"></script>
</body>
</html>
